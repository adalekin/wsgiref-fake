# Publishes to PyPI on version tags. Uses PyPI Trusted Publishing (OIDC).
# Configure pending publisher: repo adalekin/wsgiref-fake, workflow release.yml, environment pypi.

name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Build distributions
        run: uv build --no-sources

      - name: Smoke test (wheel)
        run: |
          uv run --isolated --no-project --with "$(ls dist/*.whl)" \
            python -c "from wsgiref_fake.server import make_server; import wsgiref_fake; assert make_server and wsgiref_fake.VERSION"

      - name: Smoke test (sdist)
        run: |
          uv run --isolated --no-project --with "$(ls dist/*.tar.gz)" \
            python -c "from wsgiref_fake.server import make_server; import wsgiref_fake; assert make_server and wsgiref_fake.VERSION"

      - name: Publish to PyPI
        run: uv publish
